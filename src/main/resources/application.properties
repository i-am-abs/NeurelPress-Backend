spring.application.name=NeurelPress Blogging App
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.main.lazy-initialization=true
spring.main.banner-mode=off

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=5m

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

server.port=${PORT:8080}
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain,text/css
server.shutdown=graceful
server.tomcat.threads.max=30
server.tomcat.threads.min-spare=4

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

neuralpress.jwt.secret=${NEURELPRESS_JWT_SECRET:please-change-me-please-change-me-32+chars}
neuralpress.jwt.access-expiration-ms=${NEURELPRESS_JWT_ACCESS_TTL_MS:1800000}
neuralpress.jwt.refresh-expiration-ms=${NEURELPRESS_JWT_REFRESH_TTL_MS:604800000}
neuralpress.cors.allowed-origins=${NEURELPRESS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3001,http://localhost:3001}
neuralpress.app.frontend-url=${NEURELPRESS_FRONTEND_URL:http://localhost:3000}
neuralpress.mail.from=${NEURELPRESS_MAIL_FROM:no-reply@neurelpress.local}
neuralpress.ai-provider=${NEURELPRESS_AI_PROVIDER:gemini}
neuralpress.gemini.api-key=${NEURELPRESS_GEMINI_API_KEY:}
neuralpress.gemini.model=${NEURELPRESS_GEMINI_MODEL:gemini-1.5-flash}

google.client-id=${GOOGLE_CLIENT_ID:}
google.client-secret=${GOOGLE_CLIENT_SECRET:}

s3.endpoint=${NEURELPRESS_S3_ENDPOINT:}
s3.access-key=${NEURELPRESS_S3_ACCESS_KEY:}
s3.secret-key=${NEURELPRESS_S3_SECRET_KEY:}
s3.bucket=${NEURELPRESS_S3_BUCKET:}
s3.public-url=${NEURELPRESS_S3_PUBLIC_URL:}
