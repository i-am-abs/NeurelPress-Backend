# Supabase (managed Postgres): defaults from your Supabase shared pooler, overridable via env vars.
spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres?sslmode=require}
spring.datasource.username=${SUPABASE_DB_USER:postgres.bwhuznefrwsamulzbwe}
spring.datasource.password=${SUPABASE_DB_PASSWORD}

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=600000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.cache.type=redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:172.17.0.1}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.timeout=2s

spring.mail.host=smtp.gmail.com
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

neuralpress.cors.allowed-origins=${NEURELPRESS_ALLOWED_ORIGINS:https://neurel-press-frontend.vercel.app}
neuralpress.cors.allowed-origin-patterns=${NEURELPRESS_ALLOWED_ORIGIN_PATTERNS:https://*.vercel.app}
neuralpress.app.frontend-url=${NEURELPRESS_FRONTEND_URL:https://neurel-press-frontend.vercel.app}

# Trust X-Forwarded-* from GCP load balancer so OAuth redirect URIs and links use the public host.
server.forward-headers-strategy=framework

logging.level.root=WARN
logging.level.com.neurelpress=INFO
logging.level.org.springframework.web.servlet.DispatcherServlet=WARN

server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.pattern=%h %l %u %t "%r" %s %b %Dms

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

neuralpress.jwt.secret=${NEURELPRESS_JWT_SECRET:please-change-me-please-change-me-32+chars}
neuralpress.jwt.access-expiration-ms=1800000
neuralpress.jwt.refresh-expiration-ms=604800000
neuralpress.mail.from=${NEURELPRESS_MAIL_FROM:no-reply@neurelpress.local}
neuralpress.ai-provider=${NEURELPRESS_AI_PROVIDER:gemini}
neuralpress.gemini.api-key=${NEURELPRESS_GEMINI_API_KEY:}
neuralpress.gemini.model=${NEURELPRESS_GEMINI_MODEL:gemini-1.5-flash}

google.client-id=${GOOGLE_CLIENT_ID:}
google.client-secret=${GOOGLE_CLIENT_SECRET:}

s3.endpoint=${NEURELPRESS_S3_ENDPOINT:}
s3.access-key=${NEURELPRESS_S3_ACCESS_KEY:}
s3.secret-key=${NEURELPRESS_S3_SECRET_KEY:}
s3.bucket=${NEURELPRESS_S3_BUCKET:}
s3.public-url=${NEURELPRESS_S3_PUBLIC_URL:}
